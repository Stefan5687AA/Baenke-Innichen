<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Innichen Bench Mapper</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <h1>Innichen Bench Mapper</h1>
      <div class="controls">
        <label class="admin-toggle">
          <input id="adminMode" type="checkbox" />
          Admin mode
        </label>
        <button id="reloadBtn" type="button">Reload</button>
      </div>
    </header>

    <main>
      <div id="map" aria-label="Map of benches in Innichen"></div>
      <aside class="legend">
        <h2>Status colors</h2>
        <ul>
          <li><span class="dot ok"></span> ok</li>
          <li><span class="dot to_check"></span> to_check</li>
          <li><span class="dot repair"></span> repair</li>
          <li><span class="dot removed"></span> removed</li>
        </ul>
      </aside>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
