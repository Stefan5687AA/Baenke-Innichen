<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bankkarte Innichen</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <h1>Bankkarte Innichen</h1>
      <div class="controls">
        <label class="icon-toggle" title="Admin-Modus">
          <input id="adminMode" type="checkbox" />
          <span aria-hidden="true">&#9881;</span>
          <span class="sr-only">Admin-Modus</span>
        </label>
        <button id="benchListBtn" class="icon-button" type="button" aria-label="B&auml;nkeliste" title="B&auml;nkeliste">&#9776;</button>
        <button id="reloadBtn" class="icon-button" type="button" aria-label="Neu laden" title="Neu laden">&#8635;</button>
      </div>
    </header>

    <main>
      <div class="map-shell">
        <div id="map" aria-label="Karte mit B&auml;nken in Innichen"></div>
        <div id="locationAccuracyNote" class="location-accuracy-note" hidden>Standort ungenau</div>
        <aside class="legend">
          <h2>Statusfarben</h2>
          <ul>
            <li><span class="dot good"></span> Guter Zustand</li>
            <li><span class="dot ok"></span> In Ordnung</li>
            <li><span class="dot repair"></span> Reparatur n&ouml;tig</li>
            <li><span class="dot removed"></span> Entfernt</li>
          </ul>
        </aside>

        <section id="benchListPanel" class="bench-list-panel" aria-live="polite" hidden>
          <div class="bench-list-header">
            <div class="bench-list-title">
              <h2>B&auml;nke</h2>
              <span id="benchListCount" class="bench-list-count">0</span>
            </div>
            <button id="closeBenchListBtn" class="icon-button compact-square" type="button" aria-label="Liste schlie&szlig;en" title="Liste schlie&szlig;en">&times;</button>
          </div>
          <label class="bench-sort">
            Sortieren
            <select id="benchSortSelect">
              <option value="inspection-desc">Zuletzt kontrolliert: neueste zuerst</option>
              <option value="inspection-asc">Zuletzt kontrolliert: &auml;lteste zuerst</option>
              <option value="status">Statusfarbe</option>
            </select>
          </label>
          <div id="benchList" class="bench-list"></div>
        </section>

        <button id="addCurrentLocationBtn" class="map-add-button" type="button" hidden>Bank hinzuf&uuml;gen</button>

        <section id="editorPanel" class="editor-panel" aria-live="polite" hidden>
          <div class="panel-card">
            <h2 id="panelTitle">Bank hinzuf&uuml;gen</h2>
            <form id="benchForm" novalidate>
              <div class="photo-field full-width">
                <img id="imagePreview" class="photo-preview" alt="Ausgew&auml;hltes Bankfoto" hidden />
                <label>
                  Foto
                  <input id="fieldImage" name="image" type="file" accept="image/*" />
                </label>
                <button id="removeImageBtn" class="danger compact" type="button" hidden>Foto l&ouml;schen</button>
                <small id="removeImageNote" class="photo-remove-note" hidden>Foto wird beim Speichern gel&ouml;scht.</small>
              </div>

              <label>
                Name
                <select id="fieldNamePreset" name="name_preset">
                  <option value="Sitzbank">Sitzbank</option>
                  <option value="Sitzbank + Tisch">Sitzbank + Tisch</option>
                  <option value="Sitzbank ohne Lehne">Sitzbank ohne Lehne</option>
                  <option value="custom">Eigene Bezeichnung</option>
                </select>
                <input id="fieldName" name="name" type="text" required maxlength="200" placeholder="Eigene Bezeichnung" hidden />
              </label>

              <label>
                Status
                <select id="fieldStatus" name="status">
                  <option value="good">Guter Zustand</option>
                  <option value="ok">In Ordnung</option>
                  <option value="repair">Reparatur n&ouml;tig</option>
                  <option value="removed">Entfernt</option>
                </select>
              </label>

              <label>
                Letzte Kontrolle
                <span class="inspection-row">
                  <input id="fieldInspection" name="last_inspection" type="date" />
                  <button id="todayInspectionBtn" class="success compact" type="button">Heute</button>
                </span>
              </label>

              <label class="full-width">
                Notiz
                <textarea id="fieldNotes" name="notes" rows="3"></textarea>
              </label>

              <label>
                Aktiv
                <select id="fieldActive" name="active">
                  <option value="1">Ja</option>
                  <option value="0">Nein</option>
                </select>
              </label>

              <div class="panel-actions edit-only full-width" id="editPanelActions" hidden>
                <button type="button" id="movePositionBtn">Position &auml;ndern</button>
                <button type="button" id="deleteBenchBtn">L&ouml;schen</button>
              </div>

              <section id="historySection" class="history-section full-width" hidden>
                <div class="history-header">
                  <h3>&Auml;nderungsverlauf</h3>
                  <span id="historyCount">0</span>
                </div>
                <div id="historyList" class="history-list"></div>
              </section>

              <div class="panel-actions full-width">
                <button type="submit" class="primary">Speichern</button>
                <button type="button" id="cancelBtn">Schlie&szlig;en</button>
              </div>
            </form>
          </div>
        </section>

        <div id="positionEditBar" class="position-edit-bar" hidden>
          <div class="position-edit-text">
            <strong id="positionEditTitle">Position &auml;ndern</strong>
            <span id="positionEditHint">Marker verschieben und speichern.</span>
          </div>
          <div class="position-edit-actions">
            <button type="button" class="primary" id="savePositionBtn">Position speichern</button>
            <button type="button" id="cancelPositionBtn">Abbrechen</button>
          </div>
        </div>
      </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
